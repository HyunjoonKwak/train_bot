services:
  trainbot:
    image: ghcr.io/${GHCR_USERNAME:-hyunjoonkwak}/trainbot:${IMAGE_TAG:-latest}
    container_name: trainbot
    restart: unless-stopped
    ports:
      - '3300:3000'
    volumes:
      - ../data:/data
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - TZ=Asia/Seoul
      - DB_PATH=/data/trainbot.db
      - LOG_DIR=/data/logs
    networks:
      - trainbot-network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  trainbot-network:
    driver: bridge
